<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MiniCraft - 3D Voxel World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:system-ui,sans-serif;cursor:default}
canvas{display:block}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;width:26px;height:26px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.85)}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#hotbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:20;background:rgba(0,0,0,.55);padding:5px 7px;border-radius:8px;backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,.1)}
#hotbar .slot{width:50px;height:50px;border:2px solid rgba(255,255,255,.12);border-radius:5px;display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .12s;background:rgba(0,0,0,.3)}
#hotbar .slot.active{border-color:#fff;background:rgba(255,255,255,.15)}
#hotbar .slot .color-preview{width:32px;height:32px;border-radius:3px;border:1px solid rgba(255,255,255,.2)}
#hotbar .slot .key{position:absolute;top:2px;left:5px;font-size:9px;color:rgba(255,255,255,.45);font-weight:700}
#overlay{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);transition:opacity .6s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:48px;font-weight:800;color:#fff;margin-bottom:6px}
#overlay .sub{color:rgba(255,255,255,.5);font-size:16px;margin-bottom:24px}
#overlay .play-btn{padding:14px 48px;font-size:18px;font-weight:700;border:none;border-radius:12px;background:linear-gradient(135deg,#4ade80,#22d3ee);color:#000;cursor:pointer;transition:transform .2s;box-shadow:0 4px 24px rgba(34,211,238,.3)}
#overlay .play-btn:hover{transform:scale(1.05)}
#overlay .controls-info{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:4px 32px;color:rgba(255,255,255,.4);font-size:12px}
#overlay .controls-info kbd{display:inline-block;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);font-family:inherit;font-size:11px;border:1px solid rgba(255,255,255,.08)}
#stats{position:fixed;top:12px;right:16px;z-index:15;color:rgba(255,255,255,.45);font-size:12px;text-align:right;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.6);line-height:1.6}
#loading{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;font-size:16px;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
#loading .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#4ade80;border-radius:50%;animation:spin .8s linear infinite;margin-right:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;color:#ff6b6b;font-size:14px;background:rgba(0,0,0,.7);padding:10px 20px;border-radius:8px;display:none}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Building world...</span></div>
<div id="crosshair"></div>
<div id="stats"><div id="fps-display">FPS: 0</div><div id="block-count">Generating...</div></div>
<div id="hotbar"></div>
<div id="error-msg"></div>

<div id="overlay">
    <h1>MiniCraft</h1>
    <div class="sub">A tiny 3D voxel world</div>
    <button class="play-btn" id="playBtn">Play</button>
    <div class="controls-info">
        <span><kbd>W A S D</kbd> Move</span><span><kbd>1-8</kbd> Select block</span>
        <span><kbd>Space</kbd> Jump</span><span><kbd>Left Click</kbd> Break</span>
        <span><kbd>Shift</kbd> Sneak</span><span><kbd>Right Click</kbd> Place</span>
        <span><kbd>Esc</kbd> Pause</span><span><kbd>Scroll</kbd> Cycle</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// MiniCraft — Pure three.js (r128, CDN script tag, no modules)
// ═══════════════════════════════════════════════════════════════

const BLOCK = { AIR:0, GRASS:1, DIRT:2, STONE:3, WOOD:4, LEAVES:5, SAND:6, PLANKS:7, COBBLESTONE:8, BEDROCK:9 };

const BLOCK_COLORS = {
    [BLOCK.GRASS]:       0x7CBD5E,
    [BLOCK.DIRT]:        0x8B6B4D,
    [BLOCK.STONE]:       0x808080,
    [BLOCK.WOOD]:        0x8B6B4D,
    [BLOCK.LEAVES]:      0x5A7C3A,
    [BLOCK.SAND]:        0xE8D68B,
    [BLOCK.PLANKS]:      0xC4A46D,
    [BLOCK.COBBLESTONE]: 0x7A7A7A,
    [BLOCK.BEDROCK]:     0x3D3D3D,
};

const HOTBAR = [BLOCK.GRASS, BLOCK.DIRT, BLOCK.STONE, BLOCK.WOOD,
                BLOCK.PLANKS, BLOCK.COBBLESTONE, BLOCK.SAND, BLOCK.LEAVES];

const W = 48, D = 48;
const GRAVITY = -22, JUMP = 8.5, SPEED = 5.0, SNEAK = 1.8, REACH = 7;

let blocks = new Map(); // "x,y,z" → blockType
let meshGroup, highlightMesh, scene, camera, renderer;
let keys = {}, selectedSlot = 0, velocity = new THREE.Vector3();
let onGround = false, isLocked = false, gameRunning = false;

function key(x,y,z) { return x+','+y+','+z; }
function getB(x,y,z) { return blocks.get(key(x,y,z)) || BLOCK.AIR; }
function setB(x,y,z,t) { if(t===BLOCK.AIR) blocks.delete(key(x,y,z)); else blocks.set(key(x,y,z), t); }
function isSolid(t) { return t !== BLOCK.AIR; }

// ─── Simple noise (no float overflow) ────────────────────────
function noise(x,z) {
    const h = (Math.abs(x)*157 + Math.abs(z)*113 + 1) % 1009;
    const h2 = (Math.abs(x)*271 + Math.abs(z)*337 + 1) % 997;
    return ((h * h2) % 1000) / 1000;
}

function sm(x,z) {
    const fx=Math.floor(x), fz=Math.floor(z);
    const fx2=fx+1, fz2=fz+1;
    const sx=x-fx, sz=z-fz;
    const sx2=sx*sx*(3-2*sx), sz2=sz*sz*(3-2*sz);
    const a = noise(fx,fz)+(noise(fx2,fz)-noise(fx,fz))*sx2;
    const b = noise(fx,fz2)+(noise(fx2,fz2)-noise(fx,fz2))*sx2;
    return a+(b-a)*sz2;
}

function height(x,z) {
    let h = sm(x*0.04,z*0.04)*5 + sm(x*0.09,z*0.09)*2.5 + sm(x*0.18,z*0.18)*1;
    return Math.max(2, Math.floor(h + 4.5));
}

// ─── World Gen ────────────────────────────────────────────────
function generateWorld() {
    blocks.clear();
    
    // Terrain
    for (let x = 0; x < W; x++) {
        for (let z = 0; z < D; z++) {
            const h = height(x, z);
            for (let y = 0; y <= h; y++) {
                let t;
                if (y === h) t = BLOCK.GRASS;
                else if (y > h - 3) t = BLOCK.DIRT;
                else if (y === 0) t = BLOCK.BEDROCK;
                else t = BLOCK.STONE;
                setB(x, y, z, t);
            }
        }
    }
    
    // Trees
    const trees = [];
    for (let i = 0; i < 25; i++) {
        const x = 3+Math.floor(Math.random()*(W-6));
        const z = 3+Math.floor(Math.random()*(D-6));
        let ok = true;
        for (const [px,pz] of trees) if (Math.abs(x-px)<5 && Math.abs(z-pz)<5) { ok=false; break; }
        if (!ok) continue;
        const h = height(x,z);
        if (h < 3 || h > 10) continue;
        trees.push([x,z]);
        
        const th = 4+Math.floor(Math.random()*2);
        for (let i = 0; i < th; i++) setB(x, h+1+i, z, BLOCK.WOOD);
        const lb = h+1+th-2;
        for (let dy = 0; dy < 4; dy++) {
            const r = (dy===1||dy===2) ? 2 : 1;
            for (let dx = -r; dx <= r; dx++) for (let dz = -r; dz <= r; dz++) {
                if (dx===0 && dz===0 && dy<=2) continue;
                if (Math.abs(dx)===r && Math.abs(dz)===r && Math.random()>0.45) continue;
                const bx=x+dx, by=lb+dy, bz=z+dz;
                if (getB(bx,by,bz)===BLOCK.AIR) setB(bx,by,bz, BLOCK.LEAVES);
            }
        }
        setB(x, lb+4, z, BLOCK.LEAVES);
    }
    
    document.getElementById('block-count').textContent = 'Blocks: ' + blocks.size;
}

// ─── Exposed check ────────────────────────────────────────────
function exposed(x,y,z) {
    if (getB(x,y,z)===BLOCK.AIR) return false;
    return getB(x+1,y,z)===BLOCK.AIR || getB(x-1,y,z)===BLOCK.AIR ||
           getB(x,y+1,z)===BLOCK.AIR || getB(x,y-1,z)===BLOCK.AIR ||
           getB(x,y,z+1)===BLOCK.AIR || getB(x,y,z-1)===BLOCK.AIR;
}

// ─── Rebuild meshes ───────────────────────────────────────────
function rebuildMeshes() {
    // Clear group
    while (meshGroup.children.length) {
        const c = meshGroup.children[0];
        c.geometry && c.geometry.dispose();
        c.material && c.material.dispose();
        meshGroup.remove(c);
    }
    
    const geo = new THREE.BoxGeometry(1, 1, 1);
    let count = 0;
    
    for (const [k, t] of blocks) {
        const [x,y,z] = k.split(',').map(Number);
        if (!exposed(x,y,z)) continue;
        
        const color = BLOCK_COLORS[t] || 0x888888;
        const mat = new THREE.MeshLambertMaterial({ color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = { bx: x, by: y, bz: z };
        meshGroup.add(mesh);
        count++;
    }
    
    console.log('Rebuilt', count, 'visible meshes (total blocks:', blocks.size + ')');
}

// ─── Raycaster (DDA) ──────────────────────────────────────────
function raycast(ox, oy, oz, dx, dy, dz, maxDist) {
    let x = Math.floor(ox), y = Math.floor(oy), z = Math.floor(oz);
    const sx = dx>0?1:-1, sy = dy>0?1:-1, sz = dz>0?1:-1;
    const tdx = dx!==0 ? Math.abs(1/dx) : Infinity;
    const tdy = dy!==0 ? Math.abs(1/dy) : Infinity;
    const tdz = dz!==0 ? Math.abs(1/dz) : Infinity;
    let tmx = dx!==0 ? ((x+(sx>0?1:0)-ox)/dx) : Infinity;
    let tmy = dy!==0 ? ((y+(sy>0?1:0)-oy)/dy) : Infinity;
    let tmz = dz!==0 ? ((z+(sz>0?1:0)-oz)/dz) : Infinity;
    let px=x, py=y, pz=z;
    
    for (let i = 0; i < maxDist*3; i++) {
        const bt = getB(x,y,z);
        if (bt !== BLOCK.AIR) return { hit:true, x, y, z, px, py, pz, type:bt };
        px=x; py=y; pz=z;
        if (tmx < tmy) {
            if (tmx < tmz) { x+=sx; tmx+=tdx; }
            else { z+=sz; tmz+=tdz; }
        } else {
            if (tmy < tmz) { y+=sy; tmy+=tdy; }
            else { z+=sz; tmz+=tdz; }
        }
    }
    return { hit:false };
}

let pointerYaw = 0, pointerPitch = 0; // synced to camera in init()

function setupPointerLock() {
    document.addEventListener('pointerlockchange', () => {
        isLocked = document.pointerLockElement === document.body;
        if (!gameRunning) return;
        if (isLocked) document.getElementById('overlay').classList.add('hidden');
        else document.getElementById('overlay').classList.remove('hidden');
    });
    document.addEventListener('mousemove', (e) => {
        if (!isLocked) return;
        pointerYaw -= e.movementX * 0.002;
        pointerPitch -= e.movementY * 0.002;
        pointerPitch = Math.max(-1.4, Math.min(1.4, pointerPitch));
        camera.quaternion.setFromEuler(new THREE.Euler(pointerPitch, pointerYaw, 0, 'YXZ'));
    });
}

// ─── Game init ────────────────────────────────────────────────
function init() {
    // Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 35, 60);
    
    // Camera
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
    const cx = Math.floor(W/2), cz = Math.floor(W/2);
    const gh = height(cx, cz);
    camera.position.set(cx + 0.5, gh + 3, cz + 0.5);
    // Look ahead so player sees terrain immediately
    camera.lookAt(cx + 5, gh - 1, cz);
    // Sync yaw/pitch with lookAt result
    const e0 = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
    pointerYaw = e0.y;
    pointerPitch = e0.x;
    
    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.prepend(renderer.domElement);
    
    // World group
    meshGroup = new THREE.Group();
    scene.add(meshGroup);
    
    // Generate world & build meshes
    generateWorld();
    rebuildMeshes();
    
    // Lighting
    const amb = new THREE.AmbientLight(0x99aacc, 0.55);
    scene.add(amb);
    const sun = new THREE.DirectionalLight(0xffeedd, 1.3);
    sun.position.set(60, 80, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 1024;
    sun.shadow.mapSize.height = 1024;
    const sd = 50;
    sun.shadow.camera.left = -sd; sun.shadow.camera.right = sd;
    sun.shadow.camera.top = sd; sun.shadow.camera.bottom = -sd;
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 120;
    sun.shadow.bias = -0.001;
    scene.add(sun);
    const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a5f0a, 0.35);
    scene.add(hemi);
    
    // Highlight
    const hGeo = new THREE.BoxGeometry(1.01, 1.01, 1.01);
    const hEdges = new THREE.EdgesGeometry(hGeo);
    highlightMesh = new THREE.LineSegments(hEdges, new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.5 }));
    highlightMesh.visible = false;
    scene.add(highlightMesh);
    
    // UI
    setupPointerLock();
    buildHotbar();
    setupInput();
    
    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Hide loading
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('block-count').textContent = 'Blocks: ' + blocks.size;
    
    gameRunning = true;
}

// ─── Hotbar ───────────────────────────────────────────────────
function buildHotbar() {
    const bar = document.getElementById('hotbar');
    bar.innerHTML = '';
    HOTBAR.forEach((t, i) => {
        const slot = document.createElement('div');
        slot.className = 'slot' + (i===0 ? ' active' : '');
        slot.dataset.index = i;
        const key = document.createElement('span');
        key.className = 'key'; key.textContent = i+1;
        slot.appendChild(key);
        const swatch = document.createElement('div');
        swatch.className = 'color-preview';
        swatch.style.background = '#' + BLOCK_COLORS[t].toString(16).padStart(6,'0');
        slot.appendChild(swatch);
        bar.appendChild(slot);
    });
}

function updateHotbar() {
    document.querySelectorAll('#hotbar .slot').forEach((s, i) => {
        s.classList.toggle('active', i === selectedSlot);
    });
}

// ─── Input ────────────────────────────────────────────────────
function setupInput() {
    document.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        const n = parseInt(e.key);
        if (n >= 1 && n <= 8) { selectedSlot = n-1; updateHotbar(); }
    });
    document.addEventListener('keyup', (e) => { keys[e.code] = false; });
    
    document.addEventListener('wheel', (e) => {
        if (!isLocked) return;
        if (e.deltaY > 0) selectedSlot = (selectedSlot+1) % HOTBAR.length;
        else selectedSlot = (selectedSlot-1+HOTBAR.length) % HOTBAR.length;
        updateHotbar();
    }, { passive:true });
    
    document.addEventListener('mousedown', (e) => {
        if (!isLocked) return;
        if (e.button === 0) breakBlock();
        if (e.button === 2) placeBlock();
    });
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    
    document.getElementById('playBtn').addEventListener('click', () => {
        document.body.requestPointerLock();
    });
}

// ─── Block actions ────────────────────────────────────────────
function getLookDir() {
    const d = new THREE.Vector3(0, 0, -1);
    d.applyQuaternion(camera.quaternion);
    return d;
}

function breakBlock() {
    const d = getLookDir();
    const r = raycast(camera.position.x, camera.position.y, camera.position.z, d.x, d.y, d.z, REACH);
    if (r.hit && r.type !== BLOCK.BEDROCK) {
        setB(r.x, r.y, r.z, BLOCK.AIR);
        rebuildMeshes();
        document.getElementById('block-count').textContent = 'Blocks: ' + blocks.size;
    }
}

function placeBlock() {
    const d = getLookDir();
    const r = raycast(camera.position.x, camera.position.y, camera.position.z, d.x, d.y, d.z, REACH);
    if (!r.hit) return;
    const px=r.px, py=r.py, pz=r.pz;
    // Don't place inside player
    const dist = Math.sqrt(
        (camera.position.x-(px+0.5))**2 +
        (camera.position.y-(py+0.5))**2 +
        (camera.position.z-(pz+0.5))**2
    );
    if (dist < 0.8) return;
    if (px<0||px>=W||py<0||py>=20||pz<0||pz>=D) return;
    if (getB(px,py,pz) === BLOCK.AIR) {
        setB(px, py, pz, HOTBAR[selectedSlot]);
        rebuildMeshes();
        document.getElementById('block-count').textContent = 'Blocks: ' + blocks.size;
    }
}

// ─── Update ───────────────────────────────────────────────────
function collides(x, y, z, rad, h) {
    const mx = Math.floor(x-rad), Mx = Math.floor(x+rad);
    const my = Math.floor(y), My = Math.floor(y+h);
    const mz = Math.floor(z-rad), Mz = Math.floor(z+rad);
    for (let bx = mx; bx <= Mx; bx++)
        for (let by = my; by <= My; by++)
            for (let bz = mz; bz <= Mz; bz++)
                if (isSolid(getB(bx,by,bz)))
                    if (x+rad>bx && x-rad<bx+1 && y+h>by && y<by+1 && z+rad>bz && z-rad<bz+1)
                        return true;
    return false;
}

function update(dt) {
    if (!isLocked || !gameRunning) return;
    dt = Math.min(dt, 0.05);
    
    const spd = keys['ShiftLeft']||keys['ShiftRight'] ? SNEAK : SPEED;
    
    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    fwd.y = 0; fwd.normalize();
    const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
    right.y = 0; right.normalize();
    
    const mv = new THREE.Vector3();
    if (keys['KeyW']) mv.add(fwd);
    if (keys['KeyS']) mv.sub(fwd);
    if (keys['KeyA']) mv.sub(right);
    if (keys['KeyD']) mv.add(right);
    if (mv.length()>0) mv.normalize().multiplyScalar(spd);
    
    velocity.x = mv.x;
    velocity.z = mv.z;
    velocity.y += GRAVITY * dt;
    
    if (keys['Space'] && onGround) { velocity.y = JUMP; onGround = false; }
    
    const pos = camera.position.clone();
    const rad = 0.3, ph = 1.7;
    
    pos.x += velocity.x * dt;
    if (collides(pos.x, pos.y, pos.z, rad, ph)) { pos.x = camera.position.x; velocity.x = 0; }
    pos.z += velocity.z * dt;
    if (collides(pos.x, pos.y, pos.z, rad, ph)) { pos.z = camera.position.z; velocity.z = 0; }
    pos.y += velocity.y * dt;
    onGround = false;
    if (collides(pos.x, pos.y, pos.z, rad, ph)) {
        if (velocity.y < 0) onGround = true;
        pos.y = camera.position.y;
        velocity.y = 0;
    }
    
    if (pos.y < -15) {
        const cx=Math.floor(W/2), cz=Math.floor(D/2);
        pos.set(cx+0.5, height(cx,cz)+3, cz+0.5);
        velocity.set(0,0,0);
    }
    
    camera.position.copy(pos);
    
    // Highlight
    const d = getLookDir();
    const hr = raycast(camera.position.x, camera.position.y, camera.position.z, d.x, d.y, d.z, REACH);
    if (hr.hit) {
        highlightMesh.position.set(hr.x+0.5, hr.y+0.5, hr.z+0.5);
        highlightMesh.visible = true;
    } else {
        highlightMesh.visible = false;
    }
}

// ─── Game loop ────────────────────────────────────────────────
let lastTime = 0, frames = 0, fpsAccum = 0;

function animate(time) {
    requestAnimationFrame(animate);
    const dt = (time - lastTime) / 1000;
    lastTime = time;
    
    if (gameRunning) {
        update(dt);
        renderer.render(scene, camera);
    }
    
    frames++;
    fpsAccum += dt;
    if (fpsAccum >= 0.5) {
        document.getElementById('fps-display').textContent = 'FPS: ' + Math.round(frames/fpsAccum);
        frames = 0; fpsAccum = 0;
    }
}

// ─── Boot ─────────────────────────────────────────────────────
setTimeout(() => {
    try {
        init();
        animate(0);
        console.log('MiniCraft: world has', blocks.size, 'blocks, camera at', camera.position);
    } catch (e) {
        console.error('MiniCraft init error:', e);
        document.getElementById('loading').textContent = 'Error: ' + e.message;
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Failed to start: ' + e.message;
    }
}, 50);
</script>
</body>
</html>
